name: Checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SLIC_PHP_VERSION: "8.1"
  SLIC_DB_IMAGE: "mariadb:11.8.3"

jobs:
  php-static:
    name: PHP static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v4

      - name: Build Strauss prefixed vendor
        run: composer strauss

      - name: PHPStan
        run: composer analyse

      - name: PHPCS
        run: composer lint

  php-tests:
    name: PHP unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Bootstrap slic
        uses: ./.github/actions/bootstrap-slic

      - name: Run Wpunit suite
        run: ${SLIC_BIN} run Wpunit

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: wpunit-output
          path: tests/_output/**
          retention-days: 14

  js-static:
    name: JS static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        run: bun run check-types

      - name: ESLint
        run: bun run lint:js

  js-tests:
    name: JS unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Vitest
        run: bun run test
